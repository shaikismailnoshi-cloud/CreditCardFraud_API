services:
  - type: web
    name: creditcard-fraud-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: FRONTEND_URL
        value: https://your-frontend-domain.onrender.com
